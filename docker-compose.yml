version: "3.9"

services:
  checker:
    image: numeiro-app:latest   # переиспользует образ, собранный сервисом bot
    env_file: .env
    restart: unless-stopped
    volumes:
      - .:/app
    command: python -m checker_bot.main
    # Порт 8081 НЕ пробрасывается наружу — доступен только внутри Docker-сети

  bot:
    build: .
    image: numeiro-app:latest   # собирает образ и тегирует его — checker его подберёт
    env_file: .env
    depends_on:
      - postgres
      - redis
      - checker
    restart: unless-stopped
    volumes:
      - .:/app
    command: python -m bot.main
    ports:
      - "8080:8080"
    healthcheck:
      # Проверяем что бот обрабатывал апдейты в последние 10 минут
      test: ["CMD", "python", "-c",
        "import time, sys; f=open('/tmp/bot_last_update'); v=float(f.read()); sys.exit(0 if time.time()-v < 660 else 1)"]
      interval: 120s      # проверять каждые 2 минуты
      timeout: 5s
      retries: 3          # 3 провала подряд → unhealthy → Docker рестартует
      start_period: 60s   # не проверять первые 60 сек (время старта)

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: numeiro
      POSTGRES_USER: numeiro
      POSTGRES_PASSWORD: numeiro_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Порт не пробрасываем наружу — бот достучится внутри Docker-сети
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    # Порт не пробрасываем наружу — бот достучится внутри Docker-сети

volumes:
  pgdata:
  redisdata:
