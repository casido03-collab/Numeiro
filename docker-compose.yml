version: "3.9"

services:
  bot:
    build: .
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    volumes:
      - .:/app
    command: python -m bot.main

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: numeiro
      POSTGRES_USER: numeiro
      POSTGRES_PASSWORD: numeiro_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Порт не пробрасываем наружу — бот достучится внутри Docker-сети
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    # Порт не пробрасываем наружу — бот достучится внутри Docker-сети

volumes:
  pgdata:
  redisdata:
