name: Deploy to VPS

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          echo "🕐 $(date -u) — start"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            set -e
            echo "🕐 $(date -u) — connected"
            cd /opt/numeiro
            git pull origin master
            if git diff HEAD~1 --name-only | grep -qE "requirements.txt|Dockerfile|docker-compose.yml|pyproject.toml|poetry.lock"; then
              echo "📦 Dependencies changed — rebuilding image..."
              docker compose up -d --build bot
            else
              echo "⚡ Code-only change — fast restart..."
              docker compose restart bot
            fi
            echo "✅ $(date -u) — done"
          ENDSSH
